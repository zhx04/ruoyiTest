name: 集成测试 - Menu

on: [workflow_dispatch]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root123
          MYSQL_DATABASE: ry-vue
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: 安装 MySQL 客户端
        run: sudo apt-get update && sudo apt-get install -y mysql-client
      - name: 等待 MySQL 就绪
        run: |
          for i in $(seq 1 30); do
            if mysqladmin ping -h 127.0.0.1 -u root -proot123 --silent 2>/dev/null; then
              echo "MySQL 就绪！"
              break
            fi
            echo "等待 MySQL... $i/30"
            sleep 2
          done
      - name: 初始化测试数据库
        run: mysql -h 127.0.0.1 -u root -proot123 ry-vue < sql/ry_20260417.sql
      - name: 运行 SysMenuControllerTest
        run: mvn test -pl ruoyi-admin -Dtest="com.ruoyi.web.controller.system.SysMenuControllerTest" -DfailIfNoTests=false -Dsurefire.failIfNoSpecifiedTests=false -am --no-transfer-progress
