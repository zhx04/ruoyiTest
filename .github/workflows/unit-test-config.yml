name: 单元测试 - SysConfig

on: [workflow_dispatch]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: 运行 SysConfigServiceTest
        run: mvn test -pl ruoyi-admin -Dtest="com.ruoyi.system.service.impl.SysConfigServiceTest" -DfailIfNoTests=false -Dsurefire.failIfNoSpecifiedTests=false -am --no-transfer-progress
