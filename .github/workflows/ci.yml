name: CI 集成测试

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # ==================== Job 1: 单元测试（白盒测试） ====================
  unit-tests:
    name: 单元测试 - Mockito白盒测试
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 运行单元测试（Mockito，无需外部依赖）
        run: mvn test -pl ruoyi-admin -Dtest="com.ruoyi.system.service.impl.*,com.ruoyi.system.service.CoreServiceTest" -DfailIfNoTests=false -Dsurefire.failIfNoSpecifiedTests=false -am --no-transfer-progress

      - name: 上传单元测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: ruoyi-admin/target/surefire-reports/

  # ==================== Job 2: 集成测试（黑盒测试） ====================
  integration-tests:
    name: 集成测试 - SpringBoot黑盒测试
    runs-on: ubuntu-latest

    # 启动 MySQL 和 Redis 服务容器
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root123
          MYSQL_DATABASE: ry-vue
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 安装 MySQL 客户端
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: 等待 MySQL 就绪
        run: |
          for i in $(seq 1 30); do
            if mysqladmin ping -h 127.0.0.1 -u root -proot123 --silent 2>/dev/null; then
              echo "MySQL 就绪！"
              break
            fi
            echo "等待 MySQL... $i/30"
            sleep 2
          done

      - name: 初始化测试数据库
        run: |
          mysql -h 127.0.0.1 -u root -proot123 ry-vue < sql/ry_20260417.sql
          echo "数据库初始化完成！"

      - name: 运行集成测试（SpringBoot + MockMvc，需 MySQL + Redis）
        run: |
          mvn test -pl ruoyi-admin \
            -Dtest="com.ruoyi.web.controller.system.*" \
            -DfailIfNoTests=false \
            -Dsurefire.failIfNoSpecifiedTests=false \
            -am \
            --no-transfer-progress

      - name: 上传集成测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: ruoyi-admin/target/surefire-reports/
